name: Daily Data Update & Deploy

on:
  schedule:
    - cron: "0 0 * * *"   # midnight UTC every day
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]        # also run on every push

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install requests pandas numpy pdfplumber beautifulsoup4 lxml

      - name: Fetch ENSO / Niño3.4 data
        run: python scripts/update_enso.py

      - name: Fetch IOD & SOI data
        run: python scripts/update_iod_soi.py

      - name: Fetch India rainfall (CHIRPS v3)
        run: python scripts/update_rainfall.py

      - name: Fetch reservoir storage (RSMS → CWC → stale fallback)
        # Non-fatal: reservoir failure must not block ENSO/IOD/rainfall deploy.
        # RSMS_SESSION_COOKIE: optional GitHub Actions secret for authenticated
        # access to rsms.cwc.gov.in. To add:
        #   Settings → Secrets and variables → Actions → New repository secret
        #   Name: RSMS_SESSION_COOKIE
        #   Value: cookie string from browser DevTools after logging in at
        #          https://rsms.cwc.gov.in/
        env:
          RSMS_SESSION_COOKIE: ${{ secrets.RSMS_SESSION_COOKIE }}
        run: python scripts/update_reservoirs.py || echo "⚠️ Reservoir fetch failed — stale data used"

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/*.csv
          git diff --cached --quiet || git commit -m "chore: data update $(date -u +%Y-%m-%d)"
          git push

  build-and-deploy:
    needs: update-data
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo (with fresh data)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No cache: npm — requires package-lock.json which is not committed.
          # npm install generates it fresh each run; caching is handled by pip cache above.

      - name: Install Node dependencies
        run: npm install

      - name: Build Observable Framework site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
